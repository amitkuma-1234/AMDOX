{{- if .Values.pdb.enabled }}
# ── API PDB ────────────────────────────────────────────────
{{- if .Values.api.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "amdox.fullname" . }}-api
  namespace: {{ include "amdox.namespace" . }}
  labels:
    {{- include "amdox.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  minAvailable: {{ .Values.pdb.api.minAvailable }}
  selector:
    matchLabels:
      {{- include "amdox.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
---
# ── Web PDB ────────────────────────────────────────────────
{{- if .Values.web.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "amdox.fullname" . }}-web
  namespace: {{ include "amdox.namespace" . }}
  labels:
    {{- include "amdox.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  minAvailable: {{ .Values.pdb.web.minAvailable }}
  selector:
    matchLabels:
      {{- include "amdox.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
{{- end }}
{{- end }}
