{{- if .Values.secrets.create }}
# ============================================================
# AMDOX Secrets
# ============================================================
# WARNING: In production, use SealedSecrets or External Secrets Operator.
# This template creates base64-encoded secrets for development only.
# For production:
#   1. Install Sealed Secrets controller: https://sealed-secrets.netlify.app/
#   2. Create SealedSecret resources instead of plain Secrets
#   3. kubeseal --format yaml < secret.yaml > sealed-secret.yaml
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amdox.fullname" . }}-secrets
  namespace: {{ include "amdox.namespace" . }}
  labels:
    {{- include "amdox.labels" . | nindent 4 }}
  annotations:
    # SealedSecrets: mark for encryption
    sealedsecrets.bitnami.com/managed: "true"
type: Opaque
data:
  {{- if .Values.secrets.databaseUrl }}
  database-url: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  {{- else }}
  database-url: {{ "postgresql://amdox:changeme@postgres:5432/amdox" | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.redisPassword }}
  redis-password: {{ .Values.secrets.redisPassword | b64enc | quote }}
  {{- else }}
  redis-password: {{ "changeme" | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtSecret }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- else }}
  jwt-secret: {{ "changeme-generate-a-real-secret" | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.esPassword }}
  elasticsearch-password: {{ .Values.secrets.esPassword | b64enc | quote }}
  {{- else }}
  elasticsearch-password: {{ "changeme" | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.keycloakClientSecret }}
  keycloak-client-secret: {{ .Values.secrets.keycloakClientSecret | b64enc | quote }}
  {{- else }}
  keycloak-client-secret: {{ "changeme" | b64enc | quote }}
  {{- end }}
{{- end }}
