{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "amdox.fullname" . }}-api
  namespace: {{ include "amdox.namespace" . }}
  labels:
    {{- include "amdox.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "amdox.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
