{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "amdox.fullname" . }}-web
  namespace: {{ include "amdox.namespace" . }}
  labels:
    {{- include "amdox.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.web.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "amdox.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
{{- end }}
