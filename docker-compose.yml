version: '3.9'

# ─────────────────────────────────────────────────────────────
# AMDOX ERP Platform — Infrastructure Stack
# Services: PostgreSQL 17, Redis 8, Keycloak 25, Elasticsearch 8
# ─────────────────────────────────────────────────────────────

services:
  # ── Primary Application Database ──────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: amdox-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-amdox}
      POSTGRES_USER: ${DB_USER:-amdox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-amdox_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-amdox} -d ${DB_NAME:-amdox}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - amdox-network

  # ── Caching & Async Processing (BullMQ) ───────────────────
  redis:
    image: redis:8-alpine
    container_name: amdox-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-amdox_redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-amdox_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - amdox-network

  # ── Keycloak Persistence ──────────────────────────────────
  keycloak-db:
    image: postgres:17-alpine
    container_name: amdox-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_secret
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - amdox-network

  # ── Identity & Access Management (Keycloak) ───────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: amdox-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_secret
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: ${KC_PORT:-8080}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin_secret}
    ports:
      - "${KC_PORT:-8080}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - amdox-network

  # ── Search & Analytics (Elasticsearch) ────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: amdox-elasticsearch
    restart: unless-stopped
    ports:
      - "${ES_PORT:-9200}:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.name=amdox-cluster
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - amdox-network

  # ── AMDOX ERP API (Phase 2) ───────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: api
    container_name: amdox-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-amdox}:${DB_PASSWORD:-amdox_secret}@postgres:5432/${DB_NAME:-amdox}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-amdox_redis_secret}
      - KEYCLOAK_BASE_URL=http://keycloak:8080
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - amdox-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  keycloak_db_data:
    driver: local
  es_data:
    driver: local

networks:
  amdox-network:
    driver: bridge
    name: amdox-network

