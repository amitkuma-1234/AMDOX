version: '3.9'

services:
  # ──────────────────────────────────────────────
  # PostgreSQL 16 — Primary Application Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: amdox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-amdox}
      POSTGRES_USER: ${POSTGRES_USER:-amdox_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amdox_secret_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - amdox-network

  # ──────────────────────────────────────────────
  # Redis 7 — Caching, Rate Limiting, Token Blacklist
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: amdox-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-amdox_redis_2024}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-amdox_redis_2024}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amdox-network

  # ──────────────────────────────────────────────
  # Keycloak 25 — Identity & Access Management
  # ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: amdox-keycloak
    restart: unless-stopped
    command: start --import-realm
    environment:
      # Admin credentials
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin_secret_2024}
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KC_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-amdox_admin}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-amdox_secret_2024}
      # HTTP settings
      KC_HTTP_ENABLED: 'true'
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: 'false'
      KC_PROXY_HEADERS: xforwarded
      # Health
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
      # Features
      KC_FEATURES: token-exchange,admin-fine-grained-authz
    ports:
      - '${KC_PORT:-8080}:8080'
    volumes:
      - ./keycloak/realm-config.json:/opt/keycloak/data/import/amdox-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: >
        bash -c 'exec 3<>/dev/tcp/localhost/8080 && echo -e "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && cat <&3 | grep -q "200 OK"'
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - amdox-network

  # ──────────────────────────────────────────────
  # Elasticsearch 8 — Search & Analytics
  # ──────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: amdox-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '${ES_PORT:-9200}:9200'
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200/_cluster/health | grep -q ''"status":"green"\|"status":"yellow"''']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - amdox-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  es_data:
    driver: local

networks:
  amdox-network:
    driver: bridge
    name: amdox-network
