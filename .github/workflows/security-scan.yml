# ============================================================
# AMDOX Security Scan — Scheduled
# ============================================================
name: Security Scan

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 6 AM UTC
  workflow_dispatch: {}

jobs:
  dependency-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.4"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level=high || true
      - name: Check outdated
        run: pnpm outdated || true

  container-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        image: [amdox-api, amdox-web, amdox-ml-service]
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:latest"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

  secret-scan:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        env:
          SEMGREP_RULES: "p/default p/typescript p/nodejs p/security-audit"
        continue-on-error: true

  notify:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [dependency-scan, container-scan, secret-scan, sast]
    if: always()
    steps:
      - uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text":"🔒 Daily security scan complete. Check <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|results>."}
