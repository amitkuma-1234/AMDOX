# ============================================================
# AMDOX CI Pipeline
# ============================================================
# Triggers on push to main/develop and all PRs.
# Matrix builds: lint, test, integration test, build, docker.
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.4"
  PYTHON_VERSION: "3.12"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ----------------------------------------------------------
  # Lint
  # ----------------------------------------------------------
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm format:check

      - name: Typecheck
        run: npm typecheck

  # ----------------------------------------------------------
  # Unit Tests
  # ----------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: "**/coverage/"
          retention-days: 7

  # ----------------------------------------------------------
  # Integration Tests
  # ----------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: amdox_test
          POSTGRES_USER: amdox
          POSTGRES_PASSWORD: amdox_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U amdox -d amdox_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push database schema
        run: pnpm db:push
        env:
          DATABASE_URL: postgresql://amdox:amdox_secret@localhost:5432/amdox_test?schema=public

      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://amdox:amdox_secret@localhost:5432/amdox_test?schema=public
          REDIS_URL: redis://localhost:6379

  # ----------------------------------------------------------
  # Python ML Service Tests
  # ----------------------------------------------------------
  test-ml:
    name: ML Service Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/ml-service/requirements.txt

      - name: Install dependencies
        working-directory: apps/ml-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff mypy

      - name: Lint (ruff)
        working-directory: apps/ml-service
        run: ruff check .

      - name: Type check (mypy)
        working-directory: apps/ml-service
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        working-directory: apps/ml-service
        run: pytest --cov=app --cov-report=xml -v

  # ----------------------------------------------------------
  # Build
  # ----------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-unit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build

  # ----------------------------------------------------------
  # Docker Build & Push
  # ----------------------------------------------------------
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, test-integration]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        app: [web, api]
        include:
          - app: web
            target: runner-web
            port: 3000
          - app: api
            target: runner-api
            port: 4000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Uncomment for AWS ECR:
      # - name: Login to Amazon ECR
      #   uses: aws-actions/amazon-ecr-login@v2
      #   env:
      #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     AWS_REGION: ${{ vars.AWS_REGION }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/amdox-${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          build-args: APP=${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------
  # Docker Build & Push (ML Service)
  # ----------------------------------------------------------
  docker-ml:
    name: Docker Build ML Service
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-ml]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/amdox-ml-service
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/ml-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------
  # ArgoCD Sync
  # ----------------------------------------------------------
  argocd-sync:
    name: ArgoCD Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker, docker-ml]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Trigger ArgoCD Sync
        run: |
          curl -sSL -X POST \
            "${{ secrets.ARGOCD_SERVER }}/api/v1/applications/${{ vars.ARGOCD_APP_NAME }}/sync" \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}'

  # ----------------------------------------------------------
  # Slack Notification
  # ----------------------------------------------------------
  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build, test-unit, test-integration, test-ml]
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.build.result }}" == "failure" || \
                "${{ needs.test-unit.result }}" == "failure" || \
                "${{ needs.test-integration.result }}" == "failure" || \
                "${{ needs.test-ml.result }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=#dc2626" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=#16a34a" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook

          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ steps.status.outputs.emoji }} *AMDOX CI* — `${{ github.ref_name }}` — *${{ steps.status.outputs.status }}*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run> | <${{ github.event.head_commit.url }}|View Commit>\n> ${{ github.event.head_commit.message }}"
                      }
                    }
                  ]
                }
              ]
            }
