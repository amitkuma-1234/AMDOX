# ============================================================
# AMDOX CI Pipeline — Production Grade
# ============================================================
# Triggers: push to main/develop, all PRs
# Jobs: Lint, Test, Security Scan, Build, Docker, Notify
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.13"
  PNPM_VERSION: "9.15.4"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ----------------------------------------------------------
  # Job 1: Lint & Format Check
  # ----------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Format check (Prettier)
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

  # ----------------------------------------------------------
  # Job 2: Unit Tests
  # ----------------------------------------------------------
  test-unit:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    strategy:
      matrix:
        node-version: ["22"]
        # Uncomment to test multiple versions:
        # node-version: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run unit tests with coverage
        run: pnpm test -- --coverage

      - name: Upload coverage to Codecov
        if: always() && matrix.node-version == '22'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/coverage/lcov.info"
          fail_ci_if_error: false

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: "**/coverage/"
          retention-days: 7

  # ----------------------------------------------------------
  # Job 3: Integration Tests
  # ----------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: amdox_test
          POSTGRES_USER: amdox
          POSTGRES_PASSWORD: amdox_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U amdox -d amdox_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run database migrations
        run: pnpm db:migrate:prod
        env:
          DATABASE_URL: postgresql://amdox:amdox_secret@localhost:5432/amdox_test?schema=public

      - name: Run integration tests
        run: pnpm test:e2e
        env:
          DATABASE_URL: postgresql://amdox:amdox_secret@localhost:5432/amdox_test?schema=public
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  # ----------------------------------------------------------
  # Job 4: ML Service Tests
  # ----------------------------------------------------------
  test-ml:
    name: ML Service Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/ml-service/requirements.txt

      - name: Install dependencies
        working-directory: apps/ml-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff mypy

      - name: Lint (ruff)
        working-directory: apps/ml-service
        run: ruff check .

      - name: Type check (mypy)
        working-directory: apps/ml-service
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        working-directory: apps/ml-service
        run: pytest --cov=app --cov-report=xml -v

      - name: Upload ML coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-coverage-report
          path: apps/ml-service/coverage.xml
          retention-days: 7

  # ----------------------------------------------------------
  # Job 5: Security Scan (Build & Scan)
  # ----------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint]
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TruffleHog: scan for leaked secrets
      - name: TruffleHog — Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      # Semgrep: SAST (Static Application Security Testing)
      - name: Semgrep — SAST
        uses: semgrep/semgrep-action@v1
        with:
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}
        env:
          SEMGREP_RULES: >-
            p/default
            p/typescript
            p/nodejs
            p/security-audit
        continue-on-error: true

      # Build Docker images for scanning
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner-api
          build-args: APP=api
          push: false
          load: true
          tags: amdox-api:scan
          cache-from: type=gha

      # Trivy: container vulnerability scan
      - name: Trivy — Container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: amdox-api:scan
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  # ----------------------------------------------------------
  # Job 6: Build Artifacts
  # ----------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-unit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  # ----------------------------------------------------------
  # Job 7: Docker Build & Push
  # ----------------------------------------------------------
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, test-integration, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        app: [web, api]
        include:
          - app: web
            target: runner-web
            port: 3000
          - app: api
            target: runner-api
            port: 4000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/amdox-${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          build-args: APP=${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Generate SBOM (Software Bill of Materials)
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/amdox-${{ matrix.app }}:latest
          format: spdx-json
          output-file: sbom-${{ matrix.app }}.spdx.json
        continue-on-error: true

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.app }}
          path: sbom-${{ matrix.app }}.spdx.json
          retention-days: 30

  # ----------------------------------------------------------
  # Job 8: Docker Build ML Service
  # ----------------------------------------------------------
  docker-ml:
    name: Docker Build ML Service
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-ml, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/amdox-ml-service
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/ml-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------
  # Job 9: ArgoCD Sync (main only)
  # ----------------------------------------------------------
  argocd-sync:
    name: ArgoCD Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker, docker-ml]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Trigger ArgoCD Sync
        run: |
          curl -sSL -X POST \
            "${{ secrets.ARGOCD_SERVER }}/api/v1/applications/${{ vars.ARGOCD_APP_NAME }}/sync" \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}'

  # ----------------------------------------------------------
  # Job 10: Notifications
  # ----------------------------------------------------------
  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build, test-unit, test-integration, test-ml, security-scan]
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.build.result }}" == "failure" || \
                "${{ needs.test-unit.result }}" == "failure" || \
                "${{ needs.test-integration.result }}" == "failure" || \
                "${{ needs.test-ml.result }}" == "failure" || \
                "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=#dc2626" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=#16a34a" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ steps.status.outputs.emoji }} *AMDOX CI* — `${{ github.ref_name }}` — *${{ steps.status.outputs.status }}*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run> | <${{ github.event.head_commit.url }}|View Commit>\n> ${{ github.event.head_commit.message }}"
                      }
                    }
                  ]
                }
              ]
            }