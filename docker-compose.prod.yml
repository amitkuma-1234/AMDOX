# ============================================================
# AMDOX ERP Platform — Production Docker Compose
# ============================================================
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================================
# Features:
#   - All services with restart: always
#   - Health checks: 10s interval, 5s timeout, 3 retries
#   - JSON-file logging with rotation
#   - Network separation: internal (db/cache) + ingress (api/web)
#   - Named volumes for persistent data
#   - Resource limits per container
# ============================================================

services:

  # ── PostgreSQL 17 (Primary Database) ──────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: amdox-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-amdox}
      POSTGRES_USER: ${DB_USER:-amdox}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c max_connections=200
      -c log_min_duration_statement=500
      -c log_checkpoints=on
      -c log_lock_waits=on
      -c ssl=off
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-amdox} -d ${DB_NAME:-amdox}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  # ── Redis 8 (Cache & BullMQ) ──────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: amdox-redis-prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite yes
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --tcp-keepalive 300
      --timeout 0
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  # ── Keycloak (Identity & Access Management) ───────────────
  keycloak-db:
    image: postgres:17-alpine
    container_name: amdox-keycloak-db-prod
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: amdox-keycloak-prod
    restart: always
    command: start --optimized
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "false"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/tls.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/tls.key
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "${KC_PORT:-8443}:8443"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8443 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
      - ingress

  # ── Elasticsearch 8 (Search & Analytics) ──────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: amdox-elasticsearch-prod
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - cluster.name=amdox-cluster
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - ELASTIC_PASSWORD=${ES_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL -u elastic:${ES_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  # ── AMDOX API (NestJS) ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner-api
      args:
        APP: api
    image: ${DOCKER_REGISTRY:-amdox}/amdox-api:${APP_VERSION:-latest}
    container_name: amdox-api-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://${DB_USER:-amdox}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-amdox}?schema=public&connection_limit=20
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KEYCLOAK_BASE_URL=https://keycloak:8443
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - ELASTICSEARCH_PASSWORD=${ES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - LOG_LEVEL=warn
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health/live').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
      replicas: 2
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
      - ingress

  # ── AMDOX Web (Next.js) ──────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner-web
      args:
        APP: web
    image: ${DOCKER_REGISTRY:-amdox}/amdox-web:${APP_VERSION:-latest}
    container_name: amdox-web-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${API_PUBLIC_URL:-http://localhost:4000}
      - NEXT_PUBLIC_KEYCLOAK_URL=${KC_PUBLIC_URL}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ingress

  # ── AMDOX ML Service (FastAPI) ───────────────────────────
  ml-service:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-amdox}/amdox-ml-service:${APP_VERSION:-latest}
    container_name: amdox-ml-prod
    restart: always
    environment:
      - ENVIRONMENT=production
      - API_BASE_URL=http://api:4000
      - LOG_LEVEL=warning
      - GUNICORN_WORKERS=4
      - MODEL_CACHE_DIR=/tmp/ml-models
    ports:
      - "${ML_PORT:-8000}:8000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
      - ingress

# ── Volumes ────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    name: amdox-postgres-data
  redis_data:
    driver: local
    name: amdox-redis-data
  keycloak_db_data:
    driver: local
    name: amdox-keycloak-db-data
  es_data:
    driver: local
    name: amdox-es-data

# ── Networks ───────────────────────────────────────────────
# Separation of concerns:
#   - internal: database, cache, search (not exposed externally)
#   - ingress: API, web, ML service (exposed via reverse proxy)
networks:
  internal:
    driver: bridge
    name: amdox-internal
    internal: true  # No external access
  ingress:
    driver: bridge
    name: amdox-ingress
