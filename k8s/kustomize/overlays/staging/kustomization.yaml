# ============================================================
# Kustomize — Staging Overlay
# ============================================================
# 2 replicas, resource limits, normal logging
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: amdox-staging

resources:
  - ../../base

patches:
  # API: 2 replicas
  - target:
      kind: Deployment
      name: ".*-api"
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LOG_LEVEL
          value: "info"

  # Web: 2 replicas
  - target:
      kind: Deployment
      name: ".*-web"
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

commonLabels:
  environment: staging
