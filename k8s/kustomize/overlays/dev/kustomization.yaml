# ============================================================
# Kustomize — Dev Overlay
# ============================================================
# 1 replica, no resource limits, debug logging
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: amdox-dev

resources:
  - ../../base

patches:
  # API: 1 replica, debug logging
  - target:
      kind: Deployment
      name: ".*-api"
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LOG_LEVEL
          value: "debug"
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits

  # Web: 1 replica
  - target:
      kind: Deployment
      name: ".*-web"
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits

commonLabels:
  environment: dev
