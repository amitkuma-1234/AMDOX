# ============================================================
# AMDOX Istio DestinationRule — Load Balancing & Circuit Breaking
# ============================================================
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: amdox-api
  namespace: amdox-production
  labels:
    app.kubernetes.io/part-of: amdox-erp
spec:
  host: amdox-api-stable
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 5s
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 100
        maxRetries: 3
    loadBalancer:
      simple: LEAST_REQUEST
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
    - name: stable
      labels:
        version: stable
    - name: canary
      labels:
        version: canary
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: amdox-web
  namespace: amdox-production
spec:
  host: amdox-web
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 200
      http:
        maxRequestsPerConnection: 50
