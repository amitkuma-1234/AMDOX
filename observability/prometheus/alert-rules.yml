# ============================================================
# Prometheus Alert Rules — AMDOX ERP
# ============================================================

groups:
  # ── Infrastructure Alerts ───────────────────────────────
  - name: infrastructure
    rules:
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% for 5+ minutes."
          runbook: "https://wiki.amdox.io/runbooks/high-cpu"

      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024) > 450
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}MB (limit: 512MB)."

      - alert: PodRestartLoop
        expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} restarting frequently"

  # ── Application Alerts ──────────────────────────────────
  - name: application
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[2m])) /
          sum(rate(http_requests_total[2m])) * 100 > 2
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Error rate > 2% for {{ $labels.service_name }}"
          description: "Error rate is {{ $value }}%. Investigate immediately."
          runbook: "https://wiki.amdox.io/runbooks/error-spikes"

      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service_name)
          ) > 1.0
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "P95 latency > 1s for {{ $labels.service_name }}"
          description: "P95 latency is {{ $value }}s."
          runbook: "https://wiki.amdox.io/runbooks/high-latency"

      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service_name)
          ) > 3.0
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "P99 latency > 3s for {{ $labels.service_name }}"

  # ── Database Alerts ─────────────────────────────────────
  - name: database
    rules:
      - alert: SlowQueries
        expr: |
          histogram_quantile(0.95,
            sum(rate(db_query_duration_seconds_bucket[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "P95 DB query time > 500ms"

      - alert: DatabaseReplicationLag
        expr: pg_replication_lag > 10
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "DB replication lag > 10s"
          description: "Replication lag is {{ $value }}s. Check replica health."

      - alert: ConnectionPoolExhaustion
        expr: pg_stat_activity_count / pg_settings_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "DB connection pool > 80% utilized"

  # ── Cache Alerts ────────────────────────────────────────
  - name: cache
    rules:
      - alert: CacheHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 90
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis memory > 90%"
          description: "Redis is using {{ $value }}% of max memory."

      - alert: LowCacheHitRate
        expr: |
          rate(cache_hits_total[5m]) /
          (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) * 100 < 70
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Cache hit rate < 70%"

  # ── Business Alerts ─────────────────────────────────────
  - name: business
    rules:
      - alert: PayrollJobStuck
        expr: time() - payroll_last_job_completed_timestamp > 3600
        for: 10m
        labels:
          severity: warning
          team: hr
        annotations:
          summary: "No payroll jobs completed in 1+ hour"

      - alert: InvoiceProcessingDelay
        expr: |
          histogram_quantile(0.95,
            rate(invoice_processing_duration_seconds_bucket[30m])
          ) > 30
        for: 15m
        labels:
          severity: warning
          team: finance
        annotations:
          summary: "Invoice processing P95 > 30s"
