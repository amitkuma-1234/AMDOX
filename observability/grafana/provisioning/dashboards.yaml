# ============================================================
# Grafana Dashboard Provisioning
# ============================================================
apiVersion: 1

providers:
  - name: "AMDOX Dashboards"
    orgId: 1
    folder: "AMDOX"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
